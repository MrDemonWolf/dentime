name: DenTime
options:
  bundleIdPrefix: com.mrdemonwolf
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
settings:
  base:
    DEVELOPMENT_TEAM: "" # TODO: set Apple Team ID in Xcode once, XcodeGen will preserve
    SWIFT_VERSION: "5.9"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
packages:
  DenTimeCore:
    path: DenTimeCore
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "5.0.0"
targets:
  DenTime-iOS:
    type: application
    platform: iOS
    sources:
      - path: DenTime
        excludes:
          - "macOS/**"
    resources:
      - path: DenTime/Assets.xcassets
    info:
      path: DenTime/Info-iOS.plist
      properties:
        CFBundleDisplayName: DenTime
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSCalendarsFullAccessUsageDescription: "DenTime uses Calendar to save finalized meetups and show busy times next to your clock."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    entitlements:
      path: DenTime/DenTime-iOS.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        aps-environment: production
    dependencies:
      - package: DenTimeCore
      - package: RevenueCat
        product: RevenueCat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mrdemonwolf.dentime
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO

  DenTime-macOS:
    type: application
    platform: macOS
    sources:
      - path: DenTime
        excludes:
          - "iOS/**"
    resources:
      - path: DenTime/Assets.xcassets
    info:
      path: DenTime/Info-macOS.plist
      properties:
        CFBundleDisplayName: DenTime
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSUIElement: YES
        NSCalendarsFullAccessUsageDescription: "DenTime uses Calendar to save finalized meetups and show busy times next to your clock."
    entitlements:
      path: DenTime/DenTime-macOS.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.developer.applesignin:
          - Default
        aps-environment: production
    dependencies:
      - package: DenTimeCore
      - package: RevenueCat
        product: RevenueCat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mrdemonwolf.dentime
        GENERATE_INFOPLIST_FILE: NO
