name: Apple TestFlight

on:
  workflow_dispatch:
    inputs:
      version:
        description: Marketing version (e.g. 0.1.0)
        required: true
        type: string
      build:
        description: Build number (e.g. 1)
        required: true
        type: string

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: apps/macOS
        run: xcodegen generate

      - name: Import signing certificate
        env:
          CERT_P12: ${{ secrets.APPLE_DIST_CERT_P12 }}
          CERT_PW: ${{ secrets.APPLE_DIST_CERT_PW }}
        run: |
          echo "$CERT_P12" | base64 -d > cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import cert.p12 -k build.keychain -P "$CERT_PW" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain

      - name: Install provisioning profile
        env:
          PROVISION: ${{ secrets.APPLE_PROVISION_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISION" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/DenTime.provisionprofile

      - name: Set version numbers
        working-directory: apps/macOS
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ inputs.version }}" DenTime/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ inputs.build }}" DenTime/Info.plist

      - name: Archive
        working-directory: apps/macOS
        run: |
          xcodebuild \
            -project DenTime.xcodeproj \
            -scheme DenTime \
            -configuration Release \
            -archivePath build/DenTime.xcarchive \
            -destination "generic/platform=macOS" \
            archive

      - name: Export PKG
        working-directory: apps/macOS
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/DenTime.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export

      - name: Upload to App Store Connect
        working-directory: apps/macOS
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PW: ${{ secrets.APPLE_APP_SPECIFIC_PW }}
        run: |
          FILE=$(ls build/export/*.pkg 2>/dev/null | head -1)
          xcrun altool --upload-app \
            --type osx \
            --file "$FILE" \
            --username "$APPLE_ID" \
            --password "$APPLE_APP_PW"
