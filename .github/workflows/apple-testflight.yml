name: Apple TestFlight

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: true
        type: choice
        options: [iOS, macOS]
      version:
        description: Marketing version (e.g. 0.1.0)
        required: true
        type: string
      build:
        description: Build number (e.g. 1)
        required: true
        type: string

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: apple
        run: xcodegen generate

      - name: Import signing certificate
        env:
          CERT_P12: ${{ secrets.APPLE_DIST_CERT_P12 }}
          CERT_PW: ${{ secrets.APPLE_DIST_CERT_PW }}
        run: |
          echo "$CERT_P12" | base64 -d > cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import cert.p12 -k build.keychain -P "$CERT_PW" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain

      - name: Install provisioning profile
        env:
          PROVISION_P8: ${{ secrets.APPLE_PROVISION_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISION_P8" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/DenTime.mobileprovision

      - name: Set version numbers
        working-directory: apple
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ inputs.version }}" DenTime/Info-${{ inputs.platform }}.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ inputs.build }}" DenTime/Info-${{ inputs.platform }}.plist

      - name: Archive
        working-directory: apple
        run: |
          xcodebuild \
            -project DenTime.xcodeproj \
            -scheme DenTime-${{ inputs.platform }} \
            -configuration Release \
            -archivePath build/DenTime.xcarchive \
            -destination "generic/platform=${{ inputs.platform == 'iOS' && 'iOS' || 'macOS' }}" \
            archive

      - name: Export IPA / PKG
        working-directory: apple
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/DenTime.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export

      - name: Upload to App Store Connect
        working-directory: apple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PW: ${{ secrets.APPLE_APP_SPECIFIC_PW }}
        run: |
          FILE=$(ls build/export/*.ipa build/export/*.pkg 2>/dev/null | head -1)
          xcrun altool --upload-app \
            --type ${{ inputs.platform == 'iOS' && 'ios' || 'osx' }} \
            --file "$FILE" \
            --username "$APPLE_ID" \
            --password "$APPLE_APP_PW"
