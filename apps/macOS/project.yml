name: DenTime
options:
  bundleIdPrefix: com.mrdemonwolf
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  xcodeVersion: "15.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  DenTime:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: DenTime
        excludes:
          - "Info.plist"
          - "DenTime.entitlements"
    resources:
      - DenTime/Resources/Assets.xcassets
      - DenTime/Resources/PrivacyInfo.xcprivacy
    info:
      path: DenTime/Info.plist
      properties:
        CFBundleDisplayName: DenTime
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.productivity
        NSHumanReadableCopyright: "© 2026 MrDemonWolf, Inc."
        NSSupportsAutomaticTermination: true
        NSSupportsSuddenTermination: true
    entitlements:
      path: DenTime/DenTime.entitlements
      properties:
        com.apple.security.app-sandbox: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mrdemonwolf.dentime
        PRODUCT_NAME: DenTime
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: DenTime/Info.plist
        CODE_SIGN_ENTITLEMENTS: DenTime/DenTime.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"

  DenTimeTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - DenTimeTests
    dependencies:
      - target: DenTime
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mrdemonwolf.dentime.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DenTime.app/Contents/MacOS/DenTime"

schemes:
  DenTime:
    build:
      targets:
        DenTime: all
        DenTimeTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - DenTimeTests
    archive:
      config: Release
